# Conda environment for AutoQuant (see AUTOQUANT_BUILD_GUIDE.md)
name: autoquant
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip
  - jupyter
  - jupyterlab
  - ipykernel
  - ipywidgets
  - matplotlib
  - seaborn
  - numpy>=1.24.0
  - tqdm>=4.65.0
  - pip:
      - torch>=2.0.0
      - transformers>=4.35.0
      - accelerate>=0.24.0
      - bitsandbytes>=0.41.0
      - sentencepiece>=0.1.99
      - protobuf>=3.20.0
      - flask>=2.3.0
      - flask-cors>=4.0.0
      - waitress>=3.0.0
      - psutil>=5.9.0
      - pandas>=2.0.0
